<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSR HM — Personal View</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Personal view specific overrides */
    body { padding-bottom: 2rem; }
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: 300px;
      background: var(--bg-panel); border-right: 1px solid var(--border);
      padding: 2rem; overflow-y: auto;
    }
    .main-content {
      margin-left: 300px; padding: 2rem;
    }
    .sidebar-title { font-size: 1.8rem; margin: 0 0 0.5rem 0; color: var(--accent); }
    .sidebar-meta { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem; }
    .sidebar-guidance { background: rgba(255,255,255,0.03); padding: 1rem; border-radius: 8px; margin-bottom: 2rem; }
    .sidebar-guidance p { margin-bottom: 0.5rem; font-size: 0.9rem; }
    .sidebar-guidance strong { color: var(--text-bright); }
    
    .personal-fight-card {
      background: var(--bg-panel); border: 1px solid var(--border);
      border-radius: 8px; margin-bottom: 2rem; overflow: hidden;
    }
    .personal-fight-header {
      background: rgba(255,255,255,0.03); padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 1rem;
    }
    .personal-fight-header h2 { margin: 0; font-size: 1.2rem; color: var(--text-bright); }
    .personal-fight-body { padding: 1.5rem; }
    
    .fight-content-grid {
      display: grid; grid-template-columns: 250px 1fr 1fr; gap: 2rem;
    }
    .personal-section h3 {
      font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;
      color: var(--text-muted); margin: 0 0 1rem 0; border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
    }
    .personal-list { padding-left: 1.2rem; margin: 0; }
    .personal-list li { margin-bottom: 0.5rem; line-height: 1.4; }
    .highlight-me { background: rgba(255, 215, 0, 0.15); color: var(--gold); padding: 0 4px; border-radius: 3px; }

    @media (max-width: 1000px) {
      .sidebar { position: static; width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
      .main-content { margin-left: 0; }
      .fight-content-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div style="margin-bottom: 2rem;">
      <label for="player-selector" style="display:block; margin-bottom:0.5rem; color:var(--text-muted); font-size:0.85rem;">Select Player:</label>
      <select id="player-selector" style="width:100%; padding:0.5rem; background:var(--bg-main); color:var(--text-main); border:1px solid var(--border); border-radius:4px;">
      </select>
    </div>
    <div id="sidebar-content">
      <!-- Populated by JS -->
      <p style="color:var(--text-muted); font-style:italic;">Select a player to view their specific assignments.</p>
    </div>
    <div style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border);">
      <a href="index.html" style="color:var(--accent); text-decoration:none; font-size:0.9rem;">← Back to Full Guide</a>
    </div>
  </aside>

  <main class="main-content" id="main-container">
    <!-- Populated by JS -->
  </main>

  <script src="../data/role.js"></script>
  <script src="../data/assignment-ids.js"></script>
  <script src="../data/render-option.js"></script>
  <script src="../data/npc.js"></script>
  <script src="../data/fights.js"></script>
  <script src="../data/assignments.js"></script>
  <script src="../renderer/assignment-renderer.js"></script>
  <script src="data.js"></script>
  <script src="players.js"></script>
  <script src="player-view.js"></script>
</body>
</html>
